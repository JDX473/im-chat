server:
  port: 8080

spring:
  application:
    name: im-chat

  # MySQL
  datasource:
    url: jdbc:mysql://103.36.220.40:3306/im_chat?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: jdx
    password: jiangdongxu0211

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
