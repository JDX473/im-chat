    username: jdx
    password: jiangdongxu0211
    database: 0
    timeout: 5000ms
    jedis:
      pool:
        max-active: 100
        max-wait: -1ms
        min-idle: 10

# RocketMQ (align with webchat: message transport to/from im-long-connection)
rocketmq:
  name-server: 103.36.220.40:9876
  producer:
    group: pg_im_chat
    send-message-timeout: 3000

logging:
  level:
    com.im.chat: DEBUG
