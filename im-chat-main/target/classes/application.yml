server:
  port: 8080

spring:
  application:
    name: im-chat

  # H2 in-memory database (for dev/demo)
  datasource:
    url: jdbc:h2:mem:im_ddd;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: true
    deserialization:
      fail-on-unknown-properties: false

logging:
  level:
    com.im.chat: DEBUG
